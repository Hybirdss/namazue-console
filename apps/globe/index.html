        <h1 itemprop="name">Namazue — Global Multi-Hazard Intelligence Console</h1>
        <p class="nz-speakable" itemprop="description">Namazue is a free, real-time global multi-hazard intelligence console available at <a href="https://namazue.dev" itemprop="url">namazue.dev</a>. It monitors earthquakes, wildfires, storms, volcanic activity, and other natural hazards worldwide, combining data from USGS, JMA, NASA FIRMS, and GDACS with GMPE seismic intensity modeling and infrastructure impact assessment.</p>

        <h2>What Namazue Does</h2>
        <p>Namazue provides operator-grade situational awareness by aggregating authoritative data from government and scientific agencies into a single spatial intelligence console. Unlike simple earthquake notification apps, Namazue models actual ground shaking intensity using the Si & Midorikawa 1999 Ground Motion Prediction Equation (GMPE), assesses which infrastructure assets (ports, rail, hospitals, power plants) are at risk, and integrates multiple hazard types including wildfires and storms for comprehensive disaster intelligence.</p>

        <h2>Key Features</h2>
        <ul>
          <li><strong>Real-time earthquake monitoring</strong> — Live USGS (global) and JMA (Japan) seismic data with 45-second update cycles. Database contains 57,000+ earthquake records from 1900 to present.</li>
          <li><strong>GMPE intensity modeling</strong> — Si & Midorikawa 1999 model computes estimated JMA seismic intensity at any location, accounting for magnitude, depth, distance, fault type, and soil conditions (Vs30). Validated to +/-1.0 JMA of historical actuals.</li>
          <li><strong>Infrastructure impact assessment</strong> — Identifies and priority-ranks at-risk ports, rail stations, hospitals, airports, and power plants within modeled intensity zones.</li>
          <li><strong>NASA FIRMS wildfire tracking</strong> — Satellite-detected active fire hotspots globally, tracking 9,000+ active fires.</li>
          <li><strong>GDACS multi-hazard alerts</strong> — Global disaster alerts covering earthquakes, floods, tropical cyclones, and volcanic eruptions.</li>
          <li><strong>Active fault visualization</strong> — 766 mapped fault lines across Japan with geological metadata.</li>
          <li><strong>Depth cross-section analysis</strong> — Vertical cross-sections through earthquake clusters for subduction zone geometry analysis.</li>
          <li><strong>3D city models</strong> — Japan PLATEAU 3D building data for urban impact visualization.</li>
          <li><strong>Historical earthquake catalog</strong> — Searchable archive spanning 1900 to present.</li>
          <li><strong>Command palette</strong> — Keyboard-driven operator interface for rapid navigation.</li>
        </ul>

        <h2>Data Sources</h2>
        <p>All data comes from authoritative government and scientific agencies:</p>
        <ul>
          <li><strong>USGS</strong> (United States Geological Survey) — Global earthquake catalog, updated every 45 seconds</li>
          <li><strong>JMA</strong> (Japan Meteorological Agency / 気象庁) — Japan regional seismic data and tsunami warnings</li>
          <li><strong>NASA FIRMS</strong> (Fire Information for Resource Management System) — Global satellite wildfire detection</li>
          <li><strong>GDACS</strong> (Global Disaster Alert and Coordination System) — Multi-hazard global alerts</li>
          <li><strong>EONET</strong> (NASA Earth Observatory Natural Event Tracker) — Natural event tracking</li>
          <li><strong>NWS</strong> (National Weather Service) — US severe weather alerts</li>
          <li><strong>GSI</strong> (Geospatial Information Authority of Japan) — Terrain and geodetic data</li>
          <li><strong>J-SHIS</strong> — Japan Seismic Hazard Information Station</li>
          <li><strong>PLATEAU</strong> — Japan 3D city model data from MLIT</li>
        </ul>

        <h2>Who Uses Namazue</h2>
        <p>Infrastructure operators (port authorities, rail operators, hospital systems, power companies), emergency management teams, seismologists and geoscience researchers, media organizations seeking verified disaster data, and the general public interested in real-time natural hazard awareness.</p>

        <h2>How Namazue Compares</h2>
        <p>Unlike the USGS earthquake map which shows raw epicenter data, Namazue adds GMPE-modeled intensity fields, infrastructure impact assessment, multi-hazard integration, and an operator-grade interface. Unlike consumer earthquake apps focused on push notifications, Namazue provides spatial analysis tools for professional decision-making in critical infrastructure management.</p>

        <h2>Technical Details</h2>
        <p>Built with vanilla TypeScript (no React/Vue), MapLibre GL JS and Deck.gl for high-performance spatial rendering, Cloudflare Workers with Hono for the backend API, and Neon Postgres with PostGIS for geospatial queries. GMPE computation runs in Web Workers for non-blocking performance.</p>

        <h2>About the Name</h2>
        <p>"Namazue" (鯰絵) comes from traditional Japanese woodblock prints depicting a giant catfish (namazu) that was believed to cause earthquakes. These prints emerged after the 1855 Ansei Edo earthquake as disaster awareness art.</p>
