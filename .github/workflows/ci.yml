name: ci

on:
  push:
    branches:
      - main
      - 'codex/**'
      - 'feature/**'
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck and test
        run: npm run check

      - name: Build globe production bundle
        run: npm run build -w @namazue/globe

      - name: Worker typecheck
        run: npm run typecheck -w @namazue/worker
