name: ci

on:
  push:
    branches:
      - main
      - 'codex/**'
      - 'feature/**'
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck and test
        run: npm run check

      - name: Build globe production bundle
        run: npm run build -w @namazue/globe

      - name: Audit high and critical vulnerabilities
        run: npm run audit:high
